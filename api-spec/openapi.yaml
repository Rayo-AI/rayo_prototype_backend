openapi: 3.1.0
info:
  # Don't change title and version, these are used in the code generation and should be consistent with the package.json version. It affects import paths and generated client code. You can update the description to reflect the current state of the API, but keep title and version as is for consistency.
  title: Api
  version: 0.1.0
  description: Rayo AI Personal Finance API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: transactions
    description: Transaction operations
  - name: budget
    description: Budget management
  - name: savings
    description: Savings goals
  - name: dashboard
    description: Dashboard summaries
  - name: ai
    description: AI assistant
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/signup:
    post:
      operationId: authSignup
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupBody"
      responses:
        "201":
          description: User created, OTP sent to email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/verify-otp:
    post:
      operationId: verifyOtp
      tags: [auth]
      summary: Verify email with OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyOtpBody"
      responses:
        "200":
          description: Email verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error or invalid OTP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: authLogin
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: authMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateMe
      tags: [auth]
      summary: Update current user preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMeBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/reset-password:
    post:
      operationId: authResetPassword
      tags: [auth]
      summary: Send password reset link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthResetPasswordBody"
      responses:
        "200":
          description: Reset link sent (even if email doesn't exist, for security)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/resend-reset-link:
    post:
      operationId: authResendResetLink
      tags: [auth]
      summary: Resend password reset link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthResetPasswordBody"
      responses:
        "200":
          description: Reset link resent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/reset-password/{token}:
    patch:
      operationId: authResetPasswordWithToken
      tags: [auth]
      summary: Reset password using token from reset link
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
          description: Reset token from the password reset email link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthUpdatePasswordBody"
      responses:
        "200":
          description: Password reset successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Validation error or invalid/expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /onboarding:
    post:
      operationId: onboarding
      tags: [auth]
      summary: Complete onboarding after signup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnBoardingBody"
      responses:
        "200":
          description: Onboarding completed, user ready to use the app
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: User not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error during onboarding
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /transactions:
    get:
      operationId: listTransactions
      tags: [transactions]
      summary: List all transactions
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: description
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [income, expense]
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
        - name: amount
          in: query
          schema:
            type: number
        - name: institution
          in: query
          schema:
            type: string
        - name: merchant
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of transactions
          content:
            application/json:
              schema:
                type: object
                properties:
                  rows:
                    type: array
                    items:
                      $ref: "#/components/schemas/Transaction"
                  pagination:
                    type: object
                    properties:
                      total:
                        type: integer
                      page:
                        type: integer
                      limit:
                        type: integer
                      totalPages:
                        type: integer
                      hasNext:
                        type: boolean
                      hasPrev:  
                        type: boolean
        "400":
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createTransaction
      tags: [transactions]
      summary: Create a transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransactionBody"
      responses:
        "201":
          description: Transaction created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteTransactions
      tags: [transactions]
      summary: Delete multiple transactions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteTransactionsBody"
      responses:
        "204":
          description: Deleted
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /transactions/{id}:
    patch:
      operationId: updateTransaction
      tags: [transactions]
      summary: Update a transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTransactionBody"
      responses:
        "200":
          description: Updated transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Transaction not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  
    delete:
      operationId: deleteTransaction
      tags: [transactions]
      summary: Delete a transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Transaction not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /budget:
    get:
      operationId: getBudget
      tags: [budget]
      summary: Get all category budgets
      responses:
        "200":
          description: All category budgets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Budget"
        "404":
          description: No budget set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: upsertBudget
      tags: [budget]
      summary: Create or update budget
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertBudgetBody"
      responses:
        "200":
          description: Budget saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Budget"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /budget/{category}:
    delete:
      operationId: deleteBudget
      tags: [budget]
      summary: Delete a budget category
      parameters:
        - name: category
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "404":
          description: Budget not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /savings:
    get:
      operationId: listSavingsGoals
      tags: [savings]
      summary: List savings goals
      parameters:
        - name: name
          in: query
          schema:
            type: string
        - name: deadlineBefore
          in: query
          schema:
            type: string
        - name: deadlineAfter
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: List of savings goals
          content:
            application/json:
              schema:
                type: object
                properties:
                  rows:
                    type: array
                    items:
                      $ref: "#/components/schemas/SavingsGoal"
                  pagination:
                    type: object
                    properties:
                      total:
                        type: integer
                      page:
                        type: integer
                      limit:
                        type: integer
                      totalPages:
                        type: integer
                      hasNext:
                        type: boolean
                      hasPrev:
                        type: boolean
    post:
      operationId: createSavingsGoal
      tags: [savings]
      summary: Create a savings goal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSavingsGoalBody"
      responses:
        "201":
          description: Savings goal created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavingsGoal"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /savings/{id}:
    patch:
      operationId: updateSavingsGoal
      tags: [savings]
      summary: Update a savings goal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSavingsGoalBody"
      responses:
        "200":
          description: Updated savings goal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavingsGoal"
        "404":
          description: Savings goal not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteSavingsGoal
      tags: [savings]
      summary: Delete a savings goal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Savings goal not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: Categories list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a new category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryBody"
      responses:
        "201":
          description: Category created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary
      responses:
        "200":
          description: Dashboard summary with balance, income, expenses, savings rate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/spending-by-category:
    get:
      operationId: getSpendingByCategory
      tags: [dashboard]
      summary: Get spending grouped by category
      responses:
        "200":
          description: Spending breakdown by category
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategorySpending"

  /ai/insights:
    get:
      operationId: getAiInsights
      tags: [ai]
      summary: Get AI-generated financial insights
      responses:
        "200":
          description: AI insights list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AiInsight"

  /ai/ask:
    post:
      operationId: askAi
      tags: [ai]
      summary: Ask the AI assistant a question
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AskAiBody"
      responses:
        "200":
          description: AI response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        envelopeBased:
          type: boolean
        image:
          type: string
          nullable: true
          description: User profile image URL
      required:
        - id
        - name
        - email
        - envelopeBased

    UpdateMeBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        envelopeBased:
          type: boolean
        image:
          type: string
          nullable: true
          description: User profile image URL

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required:
        - token
        - user

    SignupBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
      required:
        - name
        - email
        - password

    LoginBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    AuthResetPasswordBody:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
        - email

    AuthUpdatePasswordBody:
      type: object
      properties:
        newPassword:
          type: string
          minLength: 8
        confirmPassword:
          type: string
          minLength: 8
      required:
        - newPassword
        - confirmPassword

    VerifyOtpBody:
      type: object
      properties:
        email:
          type: string
          format: email
        otp:
          type: string
          minLength: 1
      required:
        - email
        - otp

    OnBoardingBody:
      type: object
      properties:
        level:
          type: string
          enum: [beginner, intermediate, expert]
        method:
          type: string
          enum: [envelope, zero-based, 50/30/20, other]
        incomeSource:
          type: string
        financialGoals:
          type: array
          items:
            type: string
        categories:
          type: array
          items:
            type: string
      required:
        - level
        - method
        - incomeSource
        - financialGoals
        - categories

    Transaction:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        type:
          type: string
          enum: [income, expense]
        amount:
          type: number
        categoryId:
          type: integer
        description:
          type: string
        institution:
          type: string
        merchant:
          type: string
        date:
          type: string
        createdAt:
          type: string
      required:
        - id
        - userId
        - type
        - amount
        - categoryId
        - date
        - createdAt

    CreateTransactionBody:
      type: object
      properties:
        type:
          type: string
          enum: [income, expense]
        amount:
          type: number
          minimum: 0.01
        categoryId:
          type: integer
          minimum: 1
        category:
          type: string
        parentSlug:
          type: string
        institution:
          type: string
        merchant:
          type: string
        description:
          type: string
        date:
          type: string
          minLength: 1
      required:
        - type
        - amount
        - date

    UpdateTransactionBody:
      type: object
      properties:
        type:
          type: string
          enum: [income, expense]
        amount:
          type: number
          minimum: 0.01
        categoryId:
          type: integer
          minimum: 1
        description:
          type: string
        date:
          type: string
        institution:
          type: string
        merchant:
          type: string
      
    DeleteTransactionsBody:
      type: object
      properties:
        ids:
          type: array
          items:
            type: integer
          minItems: 1
      required:
        - ids

    Budget:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        categoryId:
          type: integer
        categoryName:
          type: string
        parentSlug:
          type: string
        monthlyLimit:
          type: number
        totalSpent:
          type: number
        remaining:
          type: number
        percentUsed:
          type: number
        rollover:
          type: boolean
        balance:
          type: number
      required:
        - id
        - userId
        - monthlyLimit
        - totalSpent
        - remaining
        - percentUsed
        - rollover

    UpsertBudgetBody:
      type: object
      properties:
        categoryId:
          type: integer
          minimum: 1
        category:
          type: string
        parentSlug:
          type: string
        monthlyLimit:
          type: number
          minimum: 0
        rollover:
          type: boolean
          default: true
        balance:
          type: number
          minimum: 0
      required:
        - monthlyLimit
        - rollover

    SavingsGoal:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        name:
          type: string
        categoryId:
          type: integer
          minimum: 1
        goalType:
          type: string
          enum:
            - PERSONAL
            - GROUP
            - AJO
        targetAmount:
          type: number
        currentAmount:
          type: number
        deadline:
          type: string
        percentComplete:
          type: number
      required:
        - id
        - userId
        - name
        - categoryId
        - goalType
        - targetAmount
        - currentAmount
        - deadline
        - percentComplete
        
    CreateSavingsGoalBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1

        categoryId:
          type: integer
          minimum: 1

        category:
          type: string
        parentSlug:
          type: string
        goalType:
          type: string
          enum:
            - PERSONAL
            - GROUP
            - AJO

        targetAmount:
          type: number
          minimum: 0.01

        deadline:
          type: string
          format: date

      required:
        - name
        - targetAmount
        - deadline
        
    UpdateSavingsGoalBody:
      type: object
      properties:
        name:
          type: string
        categoryId:
          type: integer
          minimum: 1
        category:
          type: string
        parentSlug:
          type: string
        goalType:
          type: string
          enum:
            - PERSONAL
            - GROUP
            - AJO
        targetAmount:
          type: number
        currentAmount:          
          type: number
          minimum: 0
        deadline:
          type: string
          format: date

    Category:
      type: object
      properties:
        id:
          type: integer

        name:
          type: string

        slug:
          type: string

        parentSlug:
          type: string

        emoji:
          type: string

        isSystem:
          type: boolean

      required:
        - id
        - name
        - slug
        - parentSlug
        - isSystem
          
    CreateCategoryBody:
      type: object
      properties:
        name:
          type: string

        parentSlug:
          type: string

      required:
        - name
        - parentSlug
        
    DashboardSummary:
      type: object
      properties:
        totalBalance:
          type: number
        totalIncome:         
          type: number       
        totalExpenses:       
          type: number       
        monthlyIncome:
          type: number
        monthlyExpenses:
          type: number
        monthlySavings:
          type: number
        budgetMonthlyLimit:
          type: number
        budgetPercentUsed:
          type: number
        budgets:
          type: array
          items:           
            $ref: "#/components/schemas/Budget"   
        spendingByCategory:
          type: array
          items:               
            $ref: "#/components/schemas/CategorySpending" 
        recentTransactions:
          type: array
          items:
            $ref: "#/components/schemas/Transaction"
        savingsRate:
          type: number
        savingsGoals:        
          type: array
          items:
            $ref: "#/components/schemas/SavingsGoal" 
      required:
        - totalBalance
        - totalIncome        
        - totalExpenses      
        - monthlyIncome
        - monthlyExpenses
        - monthlySavings
        - savingsRate
        - budgetMonthlyLimit
        - budgetPercentUsed
        - spendingByCategory
        - recentTransactions
        - savingsGoals      

    CategorySpending:
      type: object
      properties:
        categoryId:
          type: integer
        amount:
          type: number
        percentage:
          type: number
      required:
        - categoryId
        - amount
        - percentage

    AiInsight:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [warning, suggestion, alert, positive, observation]
        message:
          type: string
        detail:
          type: string
      required:
        - id
        - type
        - message

    AskAiBody:
      type: object
      properties:
        question:
          type: string
          minLength: 1
      required:
        - question

    AiResponse:
      type: object
      properties:
        answer:
          type: string
        insights:
          type: array
          items:
            $ref: "#/components/schemas/AiInsight"
      required:
        - answer