<!DOCTYPE html>
<html>
  <body style="margin:0;padding:0;background:#EDE4C2;font-family:Inter,Arial,sans-serif;">

    <div style="max-width:520px;margin:40px auto;padding:0 20px;">

      <div style="background:#ffffff;border-radius:16px;padding:40px 32px;">

        <h1 style="margin:0 0 20px;font-size:24px;color:#254F22;">
          Your verification code
        </h1>

        <p style="margin:0 0 16px;font-size:15px;color:#254F22;line-height:1.6;">
          Hi ${name},
        </p>

        <p style="margin:0 0 24px;font-size:15px;color:#254F22;line-height:1.6;">
          Here’s your code to continue setting up Rayo AI.
        </p>

        <div style="background:#254F22;border-radius:12px;padding:22px;text-align:center;margin-bottom:20px;">
          <div style="font-size:34px;letter-spacing:6px;color:#EDE4C2;font-family:monospace;">
            ${otp}
          </div>
        </div>

        <p style="margin:0;font-size:14px;color:#A03A13;">
          This code expires in ${expiryTime}.
        </p>

        <p style="margin:24px 0 0;font-size:14px;color:#254F22;">
          — The Rayo Team
        </p>

      </div>

    </div>

  </body>
</html>
