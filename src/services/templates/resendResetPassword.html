<!DOCTYPE html>
<html>
  <body style="margin:0;padding:0;background:#EDE4C2;font-family:Inter,Arial,sans-serif;">

    <div style="max-width:520px;margin:40px auto;padding:0 20px;">

      <div style="background:#ffffff;border-radius:16px;padding:40px 32px;">

        <h1 style="margin:0 0 16px;font-size:24px;color:#254F22;">
          New reset link
        </h1>

        <p style="margin:0 0 18px;font-size:15px;color:#254F22;line-height:1.6;">
          Here’s a new link to reset your Rayo password.
        </p>

        <p style="margin:0 0 28px;font-size:15px;color:#254F22;line-height:1.6;">
          For security, previous links are no longer active once a new one is generated.
        </p>

        <div style="text-align:center;margin:32px 0;">
          <a href="${resetUrl}/auth/reset-password?token=${token}"
            style="display:inline-block;padding:14px 26px;background:#F5824A;color:#ffffff;text-decoration:none;border-radius:10px;font-size:14px;font-weight:600;">
            Reset password
          </a>
        </div>

        <p style="margin:0 0 10px;font-size:13px;color:#254F22;">
          If button doesn't work, use the link below:
        </p>

        <p style="margin:0 0 24px;font-size:13px;color:#A03A13;word-break:break-all;">
          ${resetUrl}/auth/reset-password?token=${token}
        </p>

        <p style="margin:0;font-size:14px;color:#254F22;">
          — The Rayo Team
        </p>

      </div>

    </div>

  </body>
</html>
