<!DOCTYPE html>
<html>
  <body style="margin:0;padding:0;background:#EDE4C2;font-family:Inter,Arial,sans-serif;">

    <div style="max-width:520px;margin:40px auto;padding:0 20px;">

      <div style="background:#ffffff;border-radius:16px;padding:40px 32px;">

        <h1 style="margin:0 0 16px;font-size:24px;color:#254F22;">
          Password updated
        </h1>

        <p style="margin:0 0 18px;font-size:15px;color:#254F22;line-height:1.6;">
          Your Rayo password has been successfully changed. If you made this change, you can ignore this email.
        </p>

        <div style="padding:16px 18px;background:rgba(245,130,74,0.12);border-left:4px solid #F5824A;border-radius:8px;margin:24px 0;">
          <p style="margin:0;font-size:14px;color:#254F22;line-height:1.6;">
            If this wasn’t you, you should reset your password again or reach out to <span style="color:#F5824A;">${EMAIL_SUPPORT}</span>.
          </p>
        </div>

        <p style="margin:0;font-size:14px;color:#254F22;">
          You can continue using Rayo as normal.
        </p>

        <p style="margin:24px 0 0;font-size:14px;color:#254F22;">
          — The Rayo Team
        </p>

      </div>

    </div>

  </body>
</html>
